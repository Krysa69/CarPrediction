<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AutoScout AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container row-between">
      <div>
        <div class="logo">AutoScout AI</div>
        <div class="subtitle">Analýza inzerátů ojetých aut pomocí strojového učení</div>
      </div>
      <nav class="nav">
        <a href="{{ url_for('index') }}">Domů</a>
        <a href="{{ url_for('analyze') }}">Nová analýza</a>
        <a href="{{ url_for('about') }}">O projektu</a>
      </nav>
    </div>
  </header>
  <main class="container main-content">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container footer-text">Lokální školní aplikace • Flask • vlastní crawler • vlastní dataset</div>
  </footer>
</body>
</html>
